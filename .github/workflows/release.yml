name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd: build:win
            artifact_glob: 'dist/*.exe'
          - os: macos-latest
            build_cmd: build:mac
            artifact_glob: 'dist/*.dmg'
          - os: ubuntu-latest
            build_cmd: build:linux
            artifact_glob: 'dist/*.AppImage'

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run ${{ matrix.build_cmd }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ matrix.artifact_glob }}
